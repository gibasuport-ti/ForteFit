# Workflow para compilar o app React Vite e fazer deploy no GitHub Pages automaticamente
name: Deploy ForteFit para GitHub Pages

on:
  push:
    branches: ["Principal", "main", "master"]

  # Permite rodar este workflow manualmente na aba Actions do GitHub
  workflow_dispatch:

# Configura permissões do GITHUB_TOKEN para permitir o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo para evitar conflitos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código Fonte
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Compilar App (Vite Build)
        run: npm run build

      - name: Configurar Páginas do GitHub
        uses: actions/configure-pages@v4

      - name: Enviar Artefatos Compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
